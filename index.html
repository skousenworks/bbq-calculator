<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BBQ Start Time Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #ede9e0;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b66;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --amber-50: #FAEEDA;
    --amber-100: #FAC775;
    --amber-400: #EF9F27;
    --amber-600: #BA7517;
    --amber-800: #633806;
    --amber-900: #412402;
    --green-600: #3B6D11;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #28271f;
      --bg-tertiary: #2e2d25;
      --text-primary: #f0ede4;
      --text-secondary: #9e9b90;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
      --amber-50: #2a1f05;
      --amber-100: #3d2c08;
      --amber-400: #EF9F27;
      --amber-600: #FAC775;
      --amber-800: #FAC775;
      --amber-900: #FAEEDA;
      --green-600: #9FE1CB;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 600px; margin: 0 auto; }
  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 26px; font-weight: 600; color: var(--text-primary); }
  header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
  .card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 12px;
  }
  .meat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .meat-btn {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .meat-btn:hover { border-color: var(--border-md); background: var(--bg-primary); }
  .meat-btn.active { background: var(--amber-50); border-color: var(--amber-400); }
  .meat-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .meat-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .meat-time { font-size: 11px; color: var(--text-secondary); }
  .row { display: flex; gap: 12px; margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  .field { flex: 1; min-width: 0; }
  .field label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    padding: 8px 10px;
    font-size: 14px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    appearance: auto;
  }
  .field input:focus, .field select:focus { outline: none; box-shadow: 0 0 0 2px var(--amber-400); }
  .calc-btn {
    width: 100%;
    padding: 12px;
    background: var(--amber-600);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: filter 0.15s;
    margin-top: 4px;
  }
  .calc-btn:hover { filter: brightness(0.9); }
  .result-card {
    background: var(--amber-50);
    border: 0.5px solid var(--amber-400);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 12px;
    display: none;
  }
  .result-card.show { display: block; }
  .start-time { font-size: 38px; font-weight: 600; color: var(--amber-900); margin: 4px 0 2px; }
  .start-label { font-size: 13px; color: var(--amber-800); margin-bottom: 12px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
  .stat { background: rgba(255,255,255,0.45); border-radius: var(--radius-md); padding: 8px 10px; text-align: center; }
  .stat-val { font-size: 16px; font-weight: 600; color: var(--amber-900); }
  .stat-lbl { font-size: 11px; color: var(--amber-800); }
  .timeline { margin-top: 14px; }
  .tl-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; position: relative; }
  .tl-line { position: absolute; left: 4px; top: 14px; width: 2px; background: var(--amber-100); height: calc(100% + 4px); }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber-400); margin-top: 4px; flex-shrink: 0; z-index: 1; }
  .tl-dot.end { background: var(--green-600); }
  .tl-time { font-size: 13px; font-weight: 500; color: var(--amber-900); }
  .tl-desc { font-size: 12px; color: var(--amber-800); }
  .serve-desc { color: var(--green-600) !important; font-weight: 600; }
  .tip {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 8px 10px;
    margin-top: 10px;
    line-height: 1.5;
  }
  footer { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 2rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔥 BBQ Start Time Calculator</h1>
    <p>Enter your serve time — find out when to fire up the smoker.</p>
  </header>

  <div class="card">
    <div class="section-label">What are you cooking?</div>
    <div class="meat-grid" id="meatGrid"></div>
  </div>

  <div class="card">
    <div class="section-label">Cook details</div>
    <div class="row">
      <div class="field">
        <label for="weight">Weight (lbs)</label>
        <input type="number" id="weight" min="1" max="30" value="12" step="0.5" />
      </div>
      <div class="field">
        <label for="temp">Cook temp</label>
        <select id="temp">
          <option value="225">225°F — low &amp; slow</option>
          <option value="250" selected>250°F — classic</option>
          <option value="275">275°F — hot &amp; fast</option>
          <option value="300">300°F — faster cook</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label for="serveTime">Serve time</label>
        <input type="time" id="serveTime" value="18:00" />
      </div>
      <div class="field">
        <label for="restTime">Rest time</label>
        <select id="restTime">
          <option value="30">30 min</option>
          <option value="60" selected>1 hour</option>
          <option value="120">2 hours (FTC)</option>
          <option value="180">3 hours (FTC)</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">Calculate start time</button>
  </div>

  <div class="result-card" id="result">
    <div class="section-label" style="color:var(--amber-800);">Fire up at</div>
    <div class="start-time" id="startTimeDisplay">—</div>
    <div class="start-label" id="startLabel"></div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statCook">—</div><div class="stat-lbl">cook hrs</div></div>
      <div class="stat"><div class="stat-val" id="statRest">—</div><div class="stat-lbl">rest mins</div></div>
      <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">total hrs</div></div>
    </div>
    <div class="timeline" id="timeline"></div>
    <div class="tip" id="tipText"></div>
  </div>

  <footer>Built with ❤️ for BBQ lovers</footer>
</div>

<script>
const meats = [
  { id: 'brisket',   icon: '🥩', name: 'Brisket',    base: 1.25, fixed: null, tips: 'Wrap in butcher paper at 165°F for the best bark. Plan for a long stall around 150–165°F.', phases: ['Smoke uncovered to 165°F (~6-8 hrs)', 'Wrap & push through the stall', 'Pull at 200–205°F internal temp'] },
  { id: 'pork-butt', icon: '🐷', name: 'Pork Butt',  base: 1.5,  fixed: null, tips: 'Wrap at 165°F. Probe tender around 200–205°F — don\'t rush it. Great for long FTC resting.', phases: ['Smoke unwrapped to 165°F', 'Wrap & continue to 200–205°F', 'Pull, rest, then shred'] },
  { id: 'ribs',      icon: '🍖', name: 'Ribs',        base: null, fixed: 6,   tips: '3-2-1 method: 3 hrs smoke, 2 hrs wrapped, 1 hr sauced. Baby backs: try 2-2-1 instead.', phases: ['3 hrs naked smoke', '2 hrs wrapped in foil', '1 hr sauced & unwrapped'] },
  { id: 'chicken',   icon: '🍗', name: 'Chicken',     base: null, fixed: 3,   tips: 'Cook at higher temps (300°F+) for crispy skin. Pull at 165°F internal in the breast.', phases: ['Season & set up smoker', 'Smoke to 155°F internal', 'Raise heat, finish to 165°F'] },
  { id: 'lamb',      icon: '🐑', name: 'Lamb Leg',    base: 0.75, fixed: null, tips: 'Pull at 145°F for medium, 160°F for well done. Rosemary & garlic injection recommended.', phases: ['Smoke to 130°F', 'Push to target internal temp', 'Rest before slicing'] },
  { id: 'turkey',    icon: '🦃', name: 'Turkey',      base: 0.5,  fixed: null, tips: 'Spatchcock for more even cooking. Dry brine overnight for best results. Pull breast at 165°F.', phases: ['Low smoke at 225–250°F', 'Raise to 325°F when 75% done', 'Rest 30–60 mins'] },
];

let selected = 'brisket';

function renderMeats() {
  document.getElementById('meatGrid').innerHTML = meats.map(m => `
    <div class="meat-btn ${m.id === selected ? 'active' : ''}" onclick="selectMeat('${m.id}')">
      <span class="meat-icon">${m.icon}</span>
      <div class="meat-name">${m.name}</div>
      <div class="meat-time">${m.fixed ? m.fixed + ' hrs' : m.base + ' hr/lb'}</div>
    </div>
  `).join('');
}

function selectMeat(id) {
  selected = id;
  renderMeats();
  calculate();
}

function fmt(d) {
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}

function calculate() {
  const meat = meats.find(m => m.id === selected);
  const weight = parseFloat(document.getElementById('weight').value) || 12;
  const temp = parseInt(document.getElementById('temp').value);
  const rest = parseInt(document.getElementById('restTime').value);
  const serveVal = document.getElementById('serveTime').value;

  let cookHours;
  if (meat.fixed) {
    cookHours = meat.fixed;
  } else {
    let rate = meat.base;
    if (temp === 225) rate *= 1.15;
    else if (temp === 275) rate *= 0.85;
    else if (temp === 300) rate *= 0.75;
    cookHours = Math.round(weight * rate * 10) / 10;
  }

  const totalMins = Math.round(cookHours * 60) + rest;
  const [sh, sm] = serveVal.split(':').map(Number);
  const serveDate = new Date();
  serveDate.setHours(sh, sm, 0, 0);
  const startDate = new Date(serveDate.getTime() - totalMins * 60000);

  document.getElementById('startTimeDisplay').textContent = fmt(startDate);
  document.getElementById('startLabel').textContent = 'to serve at ' + fmt(serveDate);
  document.getElementById('statCook').textContent = cookHours;
  document.getElementById('statRest').textContent = rest;
  document.getElementById('statTotal').textContent = Math.round(totalMins / 60 * 10) / 10;
  document.getElementById('tipText').textContent = '💡 ' + meat.tips;

  const phases = meat.phases;
  const phaseDurMins = Math.round((cookHours * 60) / phases.length);
  let phaseStart = new Date(startDate);
  let tlHtml = '';

  phases.forEach((p, i) => {
    const isLast = i === phases.length - 1;
    tlHtml += `<div class="tl-item">
      ${!isLast ? '<div class="tl-line"></div>' : ''}
      <div class="tl-dot"></div>
      <div class="tl-content">
        <div class="tl-time">${fmt(phaseStart)}</div>
        <div class="tl-desc">${p}</div>
      </div>
    </div>`;
    phaseStart = new Date(phaseStart.getTime() + phaseDurMins * 60000);
  });

  const pullTime = new Date(serveDate.getTime() - rest * 60000);
  tlHtml += `<div class="tl-item">
    <div class="tl-line"></div>
    <div class="tl-dot end"></div>
    <div class="tl-content">
      <div class="tl-time">${fmt(pullTime)}</div>
      <div class="tl-desc">Pull &amp; rest (${rest} mins)</div>
    </div>
  </div>`;
  tlHtml += `<div class="tl-item">
    <div class="tl-dot end"></div>
    <div class="tl-content">
      <div class="tl-time">${fmt(serveDate)}</div>
      <div class="tl-desc serve-desc">Serve 🎉</div>
    </div>
  </div>`;

  document.getElementById('timeline').innerHTML = tlHtml;
  document.getElementById('result').classList.add('show');
}

renderMeats();
calculate();
</script>
</body>
</html>
